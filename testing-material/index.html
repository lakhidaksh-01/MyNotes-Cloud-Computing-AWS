<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #c65959;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      max-width: 520px;
    }
    img {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to My Image Page</h1>
    <p>This is a simple HTML page that displays an image.</p>
    <img src="profile3-a9VmiakG.png" alt="Sample image" />
  </div>
</body>
</html>
